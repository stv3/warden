server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header X-Content-Type-Options        "nosniff"                          always;
    add_header X-Frame-Options               "DENY"                             always;
    add_header X-XSS-Protection              "1; mode=block"                    always;
    add_header Referrer-Policy               "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy            "geolocation=(), microphone=(), camera=()" always;
    # Strict-Transport-Security is only meaningful over HTTPS — enable when TLS is terminated here
    # add_header Strict-Transport-Security   "max-age=31536000; includeSubDomains" always;

    # CSP: allow inline styles/scripts (React SPA), restrict everything else to same-origin
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';"
        always;

    # Hide nginx version
    server_tokens off;

    # ── API proxy ──────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /auth/ {
        proxy_pass         http://api:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass       http://api:8000;
        proxy_set_header Host $host;
    }

    # ── React SPA ──────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache immutable static assets (content-hashed filenames from Vite)
    location ~* \.(js|css|png|jpg|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
